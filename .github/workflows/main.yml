name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Use HTTPS for GitHub submodule URLs
        shell: bash
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Init submodules
        run: git submodule update --init --recursive

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build \
            libglfw3-dev libglew-dev libgl1-mesa-dev \
            libx11-dev libxrandr-dev libxi-dev libxcursor-dev libxinerama-dev libxxf86vm-dev

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DNANOVG_USE_SDL3=OFF

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DNANOVG_USE_SDL3=OFF

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: cmake --build build --parallel

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: cmake --build build --config Release --parallel
